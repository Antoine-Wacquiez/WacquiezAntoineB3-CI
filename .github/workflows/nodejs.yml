name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      env_target:
        description: "ENV_TARGET (ex: canary)"
        required: false
        default: ""
        type: string
      run_release:
        description: "Lancer le job de release (manuel)"
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/') && !startsWith(github.event.head_commit.message || '', 'chore: release')"
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate
        run: npm run lint

  only-canary:
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' && github.event.inputs.env_target == 'canary'"
    steps:
      - run: echo "Hello Only Canary !"

  unit-test:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/') && !startsWith(github.event.head_commit.message || '', 'chore: release')"
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

  integration-test:
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: "!startsWith(github.ref, 'refs/tags/') && !startsWith(github.event.head_commit.message || '', 'chore: release')"
    steps:
      - run: echo "Hello Integration !"

  e2e-test:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: "github.event_name == 'pull_request'"
    steps:
      - run: echo "Hello E2E !"

  build:
    runs-on: ubuntu-latest
    needs: [lint, integration-test]
    if: "!startsWith(github.ref, 'refs/tags/') && !startsWith(github.event.head_commit.message || '', 'chore: release')"
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: ./dist

  release:
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.run_release == 'true'"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes release-it --ci

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: "github.ref == 'refs/heads/main'"
    steps:
      - run: echo "Hello Deploy !"

