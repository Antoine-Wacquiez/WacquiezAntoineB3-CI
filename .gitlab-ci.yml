# .gitlab-ci.yml file

image: node:latest
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .npm/

stages:
  - validate
  - test
  - build
  - release
  - deploy

.except-release-jobs:
  rules:
    - if: '$CI_COMMIT_TAG || $CI_COMMIT_TITLE =~ /^chore: release/'
      when: never
    - when: on_success

.only-canary-jobs:
  rules:
    - if: '$ENV_TARGET == "canary"'
      when: on_success
    - when: never

.merge-request-only-jobs:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never

install:
  stage: .pre
  script:
    # define cache dir & use it npm!
    - npm ci --cache .npm --prefer-offline
lint:
  extends: .except-release-jobs
  stage: validate
  script:
    - npm run lint

only-canary:
  extends: .only-canary-jobs
  stage: validate
  script:
    - echo "Hello Only Canary !"

unit-test:
  extends: .except-release-jobs
  stage: test
  script:
    - npm test

integration-test:
  extends: .except-release-jobs
  stage: test
  needs:
    - unit-test
  script:
    - echo "Hello Integration !"

e2e-test:
  extends: .merge-request-only-jobs
  stage: test
  needs:
    - integration-test
  script:
      - echo "Hello E2E !"

  release:
  stage: release
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"
        && $CI_COMMIT_TAG == null
        && $CI_COMMIT_TITLE !~ /^chore: release/'
  before_script:
    - git config user.email $GITLAB_USER_EMAIL
    - git config user.name $GITLAB_USER_NAME
    - git remote set-url origin
      "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
    - git checkout $CI_COMMIT_BRANCH
    - git pull origin $CI_COMMIT_BRANCH --rebase
  script:
    - npx --yes release-it --ci

